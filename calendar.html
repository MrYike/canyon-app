<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>Canyon Bookings — Calendar</title>
<meta name="theme-color" content="#c45e2a"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div class="app">
  <div id="topbarEl"></div>
  <div class="hdiv"></div>

  <!-- Calendar widget -->
  <div class="cal-card">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="cal-month-title" id="calMonthTitle"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- Selected day info -->
  <div class="cal-info">
    <div class="cal-date-label" id="calDateLabel">Select a date</div>
    <div class="cal-count" id="calCount"></div>
  </div>
  <div class="hdiv"></div>
  <div class="cal-list" id="calList">
    <div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">Tap a date to see bookings</div>
  </div>

  <div id="navEl"></div>
</div>
<script src="shared.js"></script>
<script>
applyPreferences();

let calY = new Date().getFullYear();
let calM = new Date().getMonth();
let calSel = '';

async function init() {
  const user = await requireAuth();
  if (!user) return;

  document.getElementById('topbarEl').innerHTML = topbarWithCanyonPicker();
  document.getElementById('navEl').innerHTML = NAV_HTML;
  highlightNav('calendar');

  await loadData();
  renderCal();
}

function topbarWithCanyonPicker() {
  const canyons = sortedCanyons(State.data);
  const canyon = State.canyon;
  const opts = canyons.map(c =>
    `<option value="${c}"${c === canyon ? ' selected' : ''}>${c}</option>`
  ).join('');
  return `
    <div class="topbar">
      <div>
        <div class="topbar-title">Calendar</div>
        <select onchange="pickCanyon(this.value)" style="background:none;border:none;color:var(--text2);font-family:var(--font);font-size:12px;font-weight:600;outline:none;cursor:pointer;margin-top:2px">
          ${opts}
        </select>
      </div>
    </div>`;
}

function pickCanyon(c) {
  State.canyon = c;
  renderCal();
}

function changeMonth(dir) {
  calM += dir;
  if (calM > 11) { calM = 0; calY++; }
  if (calM < 0)  { calM = 11; calY--; }
  renderCal();
}

function renderCal() {
  const data = State.data;
  const canyon = State.canyon;
  const grid = document.getElementById('calGrid');
  const first = new Date(calY, calM, 1);

  document.getElementById('calMonthTitle').textContent =
    first.toLocaleString('default', { month: 'long', year: 'numeric' });

  const days = new Date(calY, calM + 1, 0).getDate();
  const startDay = (first.getDay() + 6) % 7; // Mon=0

  let html = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']
    .map(d => `<div class="cal-dow">${d}</div>`).join('');

  for (let i = 0; i < startDay; i++) html += `<div class="cal-cell empty"></div>`;

  for (let d = 1; d <= days; d++) {
    const key = `${calY}-${String(calM + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = key === todayStr();
    const isSel = key === calSel;
    const hasData = !!(data[canyon] && data[canyon][key]?.sold?.length);
    html += `<div class="cal-cell${isToday ? ' today' : ''}${isSel ? ' selected' : ''}" onclick="selectDay('${key}')">
      ${d}${hasData ? '<div class="dot"></div>' : ''}
    </div>`;
  }

  grid.innerHTML = html;
  if (calSel) renderDayList(); // re-render list for selected day
}

function selectDay(key) {
  calSel = key;
  document.getElementById('calDateLabel').textContent = fmtFull(key);
  renderCal();
  renderDayList();
}

function renderDayList() {
  const list = document.getElementById('calList');
  const day = (State.data[State.canyon] || {})[calSel];
  const count = day?.sold?.length || 0;

  document.getElementById('calCount').textContent =
    count ? `${count} booking${count === 1 ? '' : 's'}` : '';

  if (count === 0) {
    list.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">No bookings on this date</div>`;
    return;
  }

  list.innerHTML = day.sold.map(b => `
    <div class="card">
      <div class="badge badge-time" style="margin-bottom:8px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${b.time || 'TBC'}
      </div>
      <div style="font-size:15px;font-weight:700">${b.company}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:4px">Pax: ${b.pax}</div>
    </div>
  `).join('');
}

init();
</script>
</body>
</html>
