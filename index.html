<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empress – Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', system-ui, sans-serif; box-sizing: border-box; }
    body { background: #0a0a0f; color: #f0f0f5; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .sidebar { width: 280px; background: #111118; border-right: 1px solid #1e1e2a; display: flex; flex-direction: column; height: 100vh; }
    .main    { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .conv-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: background 0.15s; }
    .conv-item:hover   { background: #1a1a25; }
    .conv-item.active  { background: #1e1a2e; }

    .avatar { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #7c3aed, #a855f7); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

    .bubble { max-width: 70%; padding: 10px 16px; border-radius: 18px; line-height: 1.5; font-size: 14px; }
    .bubble.mine   { background: linear-gradient(135deg, #7c3aed, #9333ea); color: #fff; border-bottom-right-radius: 4px; }
    .bubble.theirs { background: #1e1e2a; color: #e0e0ee; border-bottom-left-radius: 4px; }

    .ts { font-size: 10px; opacity: 0.5; margin-top: 4px; text-align: right; }

    #message-input { background: #1a1a25; border: 1px solid #2a2a38; border-radius: 14px; color: #f0f0f5; padding: 12px 20px; width: 100%; font-size: 14px; outline: none; transition: border-color 0.2s; }
    #message-input:focus { border-color: #7c3aed; }
    #message-input::placeholder { color: #555; }

    .send-btn { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, #7c3aed, #9333ea); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
    .send-btn:hover { opacity: 0.85; }

    /* Auth overlay */
    #auth-overlay { position: fixed; inset: 0; background: #0a0a0f; display: flex; align-items: center; justify-content: center; z-index: 100; }
    .auth-card { background: #111118; border: 1px solid #1e1e2a; border-radius: 20px; padding: 40px; width: 360px; }
    .auth-input { background: #1a1a25; border: 1px solid #2a2a38; border-radius: 10px; color: #f0f0f5; padding: 10px 14px; width: 100%; font-size: 14px; outline: none; margin-bottom: 12px; transition: border-color 0.2s; }
    .auth-input:focus { border-color: #7c3aed; }
    .auth-btn { width: 100%; padding: 12px; border-radius: 10px; background: linear-gradient(135deg, #7c3aed, #9333ea); border: none; color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; margin-bottom: 8px; }
    .auth-btn.secondary { background: transparent; border: 1px solid #2a2a38; color: #aaa; }
    .auth-error { color: #f87171; font-size: 13px; margin-top: 8px; min-height: 18px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .modal { background: #111118; border: 1px solid #1e1e2a; border-radius: 16px; padding: 28px; width: 340px; }
    .modal input { background: #1a1a25; border: 1px solid #2a2a38; border-radius: 10px; color: #f0f0f5; padding: 10px 14px; width: 100%; font-size: 14px; outline: none; margin-bottom: 10px; }
    .modal input:focus { border-color: #7c3aed; }

    .loading { display: flex; align-items: center; gap: 8px; color: #666; font-size: 13px; padding: 20px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #7c3aed; animation: bounce 1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    #messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
  </style>
</head>
<body>

<!-- ===== AUTH OVERLAY ===== -->
<div id="auth-overlay">
  <div class="auth-card">
    <div style="margin-bottom:28px">
      <h1 style="font-size:24px;font-weight:700;margin-bottom:4px">💬 Empress</h1>
      <p style="color:#666;font-size:13px" id="auth-subtitle">Sign in to your workspace</p>
    </div>
    <div id="auth-form-login">
      <input class="auth-input" type="email" id="login-email" placeholder="Email">
      <input class="auth-input" type="password" id="login-password" placeholder="Password">
      <button class="auth-btn" onclick="signIn()">Sign In</button>
      <button class="auth-btn secondary" onclick="showSignup()">Create Account</button>
      <div class="auth-error" id="login-error"></div>
    </div>
    <div id="auth-form-signup" style="display:none">
      <input class="auth-input" type="text" id="signup-name" placeholder="Your name">
      <input class="auth-input" type="email" id="signup-email" placeholder="Email">
      <input class="auth-input" type="password" id="signup-password" placeholder="Password (min 6 chars)">
      <button class="auth-btn" onclick="signUp()">Create Account</button>
      <button class="auth-btn secondary" onclick="showLogin()">Back to Sign In</button>
      <div class="auth-error" id="signup-error"></div>
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div style="display:none; height:100vh; flex-direction:row" id="app" class="flex">

  <!-- Sidebar -->
  <div class="sidebar">
    <div style="padding:16px;border-bottom:1px solid #1e1e2a;display:flex;align-items:center;justify-content:space-between">
      <div>
        <h1 style="font-size:18px;font-weight:700">💬 Empress</h1>
        <p id="user-email-display" style="font-size:11px;color:#555;margin-top:2px"></p>
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="openNewDM()" title="New DM" style="background:#1e1e2a;border:none;color:#aaa;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px">+</button>
        <button onclick="signOut()" title="Sign out" style="background:#1e1e2a;border:none;color:#aaa;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px">↩</button>
      </div>
    </div>
    <div style="padding:8px 12px;margin:8px;background:#1e1a2e;border-radius:10px">
      <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#666;margin-bottom:4px">Channels</p>
      <div class="conv-item active" id="team-chat-item" onclick="switchConversation('eb7d79df-f157-4201-9c67-e621bdfa984e','Team Chat','group')">
        <div class="avatar">👥</div>
        <div><p style="font-size:14px;font-weight:500">Team Chat</p><p style="font-size:11px;color:#555">group</p></div>
      </div>
    </div>
    <div style="padding:8px 12px">
      <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#666;margin-bottom:4px;padding:0 4px">Direct Messages</p>
      <div id="dm-list"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div style="height:56px;border-bottom:1px solid #1e1e2a;display:flex;align-items:center;padding:0 20px;background:#0d0d15;flex-shrink:0">
      <h2 id="chat-name" style="font-size:16px;font-weight:600">Team Chat</h2>
      <span id="chat-type-badge" style="margin-left:10px;font-size:10px;background:#1e1e2a;padding:2px 8px;border-radius:6px;color:#666">group</span>
    </div>

    <div id="messages">
      <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Loading messages…</span></div>
    </div>

    <div style="padding:12px 16px;border-top:1px solid #1e1e2a;background:#0d0d15;flex-shrink:0">
      <div style="display:flex;gap:10px;align-items:center">
        <input id="message-input" type="text" placeholder="Message…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}">
        <button class="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- New DM Modal -->
<div id="dm-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:16px">New Direct Message</h3>
    <input type="email" id="dm-email" placeholder="Enter user's email address">
    <div style="color:#f87171;font-size:13px;min-height:18px;margin-bottom:10px" id="dm-error"></div>
    <div style="display:flex;gap:8px">
      <button onclick="createDM()" style="flex:1;padding:10px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#9333ea);border:none;color:#fff;font-weight:600;cursor:pointer">Start DM</button>
      <button onclick="closeDMModal()" style="flex:1;padding:10px;border-radius:10px;background:#1a1a25;border:1px solid #2a2a38;color:#aaa;cursor:pointer">Cancel</button>
    </div>
  </div>
</div>

<script>
// ========================= SUPABASE =========================
const SUPABASE_URL = 'https://akgftmrraboplxpeugvi.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_aobHSo8qxS8sM85c5qO1Tw_R2-8NyO7';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentConversationId = 'eb7d79df-f157-4201-9c67-e621bdfa984e';
let currentChannel = null;
let userProfiles = {}; // cache display names

// ========================= AUTH =========================
function showSignup() {
  document.getElementById('auth-form-login').style.display = 'none';
  document.getElementById('auth-form-signup').style.display = 'block';
  document.getElementById('auth-subtitle').textContent = 'Create your account';
}
function showLogin() {
  document.getElementById('auth-form-login').style.display = 'block';
  document.getElementById('auth-form-signup').style.display = 'none';
  document.getElementById('auth-subtitle').textContent = 'Sign in to your workspace';
}

async function signIn() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-password').value;
  document.getElementById('login-error').textContent = '';
  const { error } = await db.auth.signInWithPassword({ email, password: pw });
  if (error) { document.getElementById('login-error').textContent = error.message; return; }
  await boot();
}

async function signUp() {
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pw    = document.getElementById('signup-password').value;
  document.getElementById('signup-error').textContent = '';
  const { data, error } = await db.auth.signUp({ email, password: pw, options: { data: { full_name: name } } });
  if (error) { document.getElementById('signup-error').textContent = error.message; return; }
  // Auto sign-in after signup
  if (data.session) { await boot(); }
  else { document.getElementById('signup-error').style.color='#86efac'; document.getElementById('signup-error').textContent = 'Account created! Check your email to confirm, then sign in.'; }
}

async function signOut() {
  await db.auth.signOut();
  location.reload();
}

// ========================= BOOT =========================
async function boot() {
  const { data: { user } } = await db.auth.getUser();
  if (!user) return;
  currentUser = user;

  document.getElementById('auth-overlay').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  document.getElementById('user-email-display').textContent = user.email;

  await ensureTeamChatParticipant();
  await loadDMList();
  await loadMessages();
  subscribeToMessages();
}

async function ensureTeamChatParticipant() {
  // Try to add user to Team Chat if not already there (silent fail is fine)
  try {
    await db.from('conversation_participants').upsert(
      { conversation_id: 'eb7d79df-f157-4201-9c67-e621bdfa984e', user_id: currentUser.id },
      { onConflict: 'conversation_id,user_id', ignoreDuplicates: true }
    );
  } catch(e) { /* RLS may deny insert — that's ok if already present */ }
}

// ========================= CONVERSATIONS =========================
async function loadDMList() {
  const { data, error } = await db
    .from('conversations')
    .select('id, name, type, conversation_participants!inner(user_id)')
    .eq('conversation_participants.user_id', currentUser.id)
    .eq('type', 'dm');

  const list = document.getElementById('dm-list');
  list.innerHTML = '';
  if (!data) return;

  data.forEach(conv => {
    const item = document.createElement('div');
    item.className = 'conv-item' + (conv.id === currentConversationId ? ' active' : '');
    item.id = 'conv-' + conv.id;
    item.innerHTML = `<div class="avatar" style="font-size:16px">👤</div>
      <div><p style="font-size:14px;font-weight:500">${conv.name || 'DM'}</p><p style="font-size:11px;color:#555">direct</p></div>`;
    item.onclick = () => switchConversation(conv.id, conv.name || 'DM', 'dm');
    list.appendChild(item);
  });
}

async function switchConversation(id, name, type) {
  currentConversationId = id;
  document.getElementById('chat-name').textContent = name;
  document.getElementById('chat-type-badge').textContent = type;

  // Update active states
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('conv-' + id) || document.getElementById('team-chat-item');
  if (el) el.classList.add('active');
  if (id === 'eb7d79df-f157-4201-9c67-e621bdfa984e') document.getElementById('team-chat-item').classList.add('active');

  await loadMessages();
  subscribeToMessages();
}

// ========================= MESSAGES =========================
async function loadMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Loading…</span></div>';

  const { data, error } = await db
    .from('messages')
    .select('id, content, sender_id, created_at')
    .eq('conversation_id', currentConversationId)
    .order('created_at', { ascending: true });

  container.innerHTML = '';

  if (error) {
    container.innerHTML = `<p style="color:#f87171;padding:20px;font-size:13px">Error loading messages: ${error.message}</p>`;
    return;
  }
  if (!data || data.length === 0) {
    container.innerHTML = `<p style="color:#444;padding:20px;font-size:13px;text-align:center">No messages yet — say hello! 👋</p>`;
    return;
  }

  data.forEach(msg => renderMessage(msg));
  container.scrollTop = container.scrollHeight;
}

function renderMessage(msg) {
  const container = document.getElementById('messages');
  const isMine = msg.sender_id === currentUser.id;
  const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const wrapper = document.createElement('div');
  wrapper.style.cssText = `display:flex;flex-direction:column;align-items:${isMine ? 'flex-end' : 'flex-start'}`;
  wrapper.id = 'msg-' + msg.id;

  const senderLabel = !isMine ? `<p style="font-size:11px;color:#555;margin-bottom:4px;padding-left:4px">${getDisplayName(msg.sender_id)}</p>` : '';

  wrapper.innerHTML = `${senderLabel}
    <div class="bubble ${isMine ? 'mine' : 'theirs'}">
      <p style="margin:0">${escapeHtml(msg.content)}</p>
      <p class="ts">${time}</p>
    </div>`;
  container.appendChild(wrapper);
}

function getDisplayName(uid) {
  return userProfiles[uid] || uid.substring(0,8) + '…';
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function sendMessage() {
  const input = document.getElementById('message-input');
  const content = input.value.trim();
  if (!content || !currentConversationId) return;
  input.value = '';

  const { error } = await db.from('messages').insert({
    conversation_id: currentConversationId,
    sender_id: currentUser.id,
    content
  });

  if (error) {
    console.error('Send error:', error);
    input.value = content; // restore on error
  }
}

// ========================= REALTIME =========================
function subscribeToMessages() {
  if (currentChannel) db.removeChannel(currentChannel);

  currentChannel = db
    .channel('room-' + currentConversationId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `conversation_id=eq.${currentConversationId}`
    }, (payload) => {
      // Avoid duplicate if we already rendered optimistically
      if (document.getElementById('msg-' + payload.new.id)) return;
      renderMessage(payload.new);
      document.getElementById('messages').scrollTop = 999999;
    })
    .subscribe();
}

// ========================= DM CREATION =========================
function openNewDM() {
  document.getElementById('dm-modal').style.display = 'flex';
  document.getElementById('dm-email').value = '';
  document.getElementById('dm-error').textContent = '';
}
function closeDMModal() {
  document.getElementById('dm-modal').style.display = 'none';
}

async function createDM() {
  const email = document.getElementById('dm-email').value.trim();
  document.getElementById('dm-error').textContent = '';
  if (!email) { document.getElementById('dm-error').textContent = 'Please enter an email.'; return; }

  // Look up the user via profiles table (requires a profiles table with email exposed, or use a stored function)
  // Fallback: search by email in profiles if available
  const { data: profiles, error: profErr } = await db
    .from('profiles')
    .select('id, email, full_name')
    .eq('email', email)
    .limit(1);

  let targetId = null;
  if (profiles && profiles.length > 0) {
    targetId = profiles[0].id;
  }

  if (!targetId) {
    // Try auth.users lookup via RPC if available
    const { data: rpcData } = await db.rpc('get_user_id_by_email', { email_input: email });
    if (rpcData) targetId = rpcData;
  }

  if (!targetId) {
    document.getElementById('dm-error').textContent = 'User not found. Make sure they have an account.';
    return;
  }

  // Check for existing DM between these two users
  const { data: existing } = await db
    .from('conversations')
    .select('id, name, conversation_participants!inner(user_id)')
    .eq('type', 'dm')
    .eq('conversation_participants.user_id', currentUser.id);

  let existingDM = null;
  if (existing) {
    for (const conv of existing) {
      const { data: parts } = await db
        .from('conversation_participants')
        .select('user_id')
        .eq('conversation_id', conv.id);
      if (parts && parts.length === 2 && parts.some(p => p.user_id === targetId)) {
        existingDM = conv;
        break;
      }
    }
  }

  if (existingDM) {
    closeDMModal();
    switchConversation(existingDM.id, existingDM.name || email, 'dm');
    return;
  }

  // Create new DM conversation
  const { data: newConv, error: convErr } = await db
    .from('conversations')
    .insert({ type: 'dm', name: email })
    .select()
    .single();

  if (convErr) { document.getElementById('dm-error').textContent = convErr.message; return; }

  await db.from('conversation_participants').insert([
    { conversation_id: newConv.id, user_id: currentUser.id },
    { conversation_id: newConv.id, user_id: targetId }
  ]);

  closeDMModal();
  await loadDMList();
  switchConversation(newConv.id, email, 'dm');
}

// ========================= INIT =========================
db.auth.getSession().then(({ data: { session } }) => {
  if (session) { currentUser = session.user; boot(); }
});

db.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session && !currentUser) {
    currentUser = session.user;
    boot();
  }
});
</script>
</body>
</html>
