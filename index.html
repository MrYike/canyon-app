<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>Canyon Bookings</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c45e2a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Canyon"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0ece6;--surface:#fff;--surface2:#e8e4de;--border:#ddd8d0;
  --text:#1a1208;--text2:#6b6050;--text3:#a89880;
  --accent:#c45e2a;--accent-bg:#fdf0e8;--accent-light:#f5e0cc;
  --nav:#fff;--radius:14px;--font:'Inter',sans-serif;--fs:15px;
}
.dark{
  --bg:#1a1510;--surface:#242018;--surface2:#2e2820;--border:#3a3228;
  --text:#f5f0e8;--text2:#a89070;--text3:#706050;
  --accent:#e07840;--accent-bg:#2a1e10;--accent-light:#3a2818;--nav:#1e1a14;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:var(--fs);background:var(--bg);color:var(--text);display:flex;justify-content:center}
.app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.screen.active{display:flex}

/* Loading */
.loading-wrap{flex:1;display:flex;align-items:center;justify-content:center}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:52px 16px 12px;background:var(--bg);flex-shrink:0}
.topbar-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.topbar-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}

/* Filters */
.filters{display:flex;gap:8px;padding:0 16px 10px;flex-shrink:0}
.filter-btn{display:flex;align-items:center;gap:6px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;width:100%}
.filter-btn svg{width:14px;height:14px;color:var(--accent)}
.ch{margin-left:auto;width:12px;height:12px;color:var(--text3)}
.filter-dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;overflow:hidden;display:none;max-height:240px;overflow-y:auto}
.filter-dd.open{display:block}
.filter-opt{padding:12px 14px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.filter-opt.sel{color:var(--accent)}
.filter-opt.sel::after{content:'✓';color:var(--accent);font-weight:700}

/* Messages - iMessage style */
.msg-topbar{display:flex;align-items:center;justify-content:space-between;padding:52px 16px 8px;background:var(--bg)}
.msg-search{padding:8px 16px}
.msg-search-input{width:100%;padding:10px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;font-size:15px;outline:none}
.conversations-list{flex:1;overflow-y:auto;padding:0 16px}
.conversation-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}
.conv-avatar{width:52px;height:52px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:17px;font-weight:600;color:var(--text)}
.conv-last{font-size:14px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-screen{display:none;flex:1;flex-direction:column}
.chat-header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.chat-back{font-size:28px;cursor:pointer;padding:0 8px}
.chat-title{font-size:17px;font-weight:600}
.msg-bubbles{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg-bubble{max-width:78%;padding:11px 15px;border-radius:18px;font-size:15px;line-height:1.45}
.msg-bubble.mine{background:var(--accent);color:white;align-self:flex-end;border-bottom-right-radius:4px}
.msg-bubble.theirs{background:var(--surface);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.msg-input-bar{display:flex;gap:8px;padding:10px 14px;background:var(--surface);border-top:1px solid var(--border)}
.msg-input{flex:1;padding:11px 18px;border-radius:22px;border:1px solid var(--border);background:var(--surface2);font-size:15px;outline:none}

/* Calendar Canyon Selector */
.cal-canyon-selector{padding:0 16px 8px}

/* Settings */
.settings-scroll{flex:1;overflow-y:auto;padding:0 16px 24px;min-height:0}
.sec-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 6px}
.settings-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:8px}
.sub-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:12px 14px 6px}
.seg{display:flex;gap:3px;padding:0 8px 10px;background:var(--surface2);margin:0 8px 10px;border-radius:9px}
.seg-btn{flex:1;padding:7px;border-radius:7px;border:none;background:none;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer}
.seg-btn.active{background:var(--surface);color:var(--accent);font-weight:700}
.set-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid var(--border)}
.set-icon{width:32px;height:32px;border-radius:9px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-info{flex:1}
.set-label{font-size:14px;font-weight:600;color:var(--text)}
.set-desc{font-size:11px;color:var(--text3);margin-top:1px}
.signout-btn{width:100%;padding:13px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}

/* Bottom nav */
.bottom-nav{display:flex;background:var(--nav);border-top:1px solid var(--border);padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom));flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;border:none;background:none;cursor:pointer;font-size:10px;font-weight:500;color:var(--text3)}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- LOADING -->
  <div class="screen active" id="loadingScreen">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>

  <!-- LOGIN -->
  <div class="screen" id="loginScreen">
    <div class="login-wrap">
      <div class="login-icon"><img src="icon512.png" alt="Canyon" onerror="this.parentElement.innerHTML='🏔️'"></div>
      <div class="login-title">Canyon Bookings</div>
      <div class="login-sub">Sign in to view bookings and message your team</div>
      <button class="google-btn" onclick="signInGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>
      <div class="login-note">Only authorised staff can access this app</div>
    </div>
  </div>

  <!-- ONBOARDING (your original) -->
  <div class="screen" id="onboardScreen">
    <div class="topbar" style="padding-top:52px">
      <div class="topbar-title">Welcome!</div>
      <div id="onboardStep" style="font-size:12px;color:var(--text3)">Step 1 of 3</div>
    </div>
    <div class="onboard-wrap">
      <!-- Paste your full original onboarding HTML here if needed. For now it's placeholder. -->
      <div class="onboard-step active" id="step1">
        <div class="onboard-title">What's your role?</div>
        <button class="btn-primary" onclick="nextStep()" id="step1Next" disabled>Continue</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="screen" id="appScreen">

    <!-- HOME TAB -->
    <div class="screen active" id="homeTab">
      <div class="topbar">
        <div class="topbar-title">Canyon Bookings</div>
        <div class="topbar-actions">
          <button class="icon-btn" onclick="loadData(true)" id="refreshBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          </button>
          <div id="userAvatarEl"></div>
        </div>
      </div>
      <div class="filters">
        <div class="filter-wrap">
          <button class="filter-btn" onclick="toggleDd('canyonDd')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span id="canyonLabel" style="flex:1;text-align:left">Empress</span>
            <svg class="ch" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="filter-dd" id="canyonDd"></div>
        </div>
        <div class="filter-wrap">
          <button class="filter-btn" onclick="toggleDd('dateDd')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="dateLabel" style="flex:1;text-align:left">Today</span>
            <svg class="ch" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="filter-dd" id="dateDd"></div>
        </div>
      </div>
      <div class="summary-bar" id="homeSummary">Loading...</div>
      <div class="bookings-scroll" id="homeList"></div>
    </div>

    <!-- CALENDAR TAB -->
    <div class="screen" id="calTab">
      <div class="topbar">
        <div class="topbar-title">Calendar</div>
      </div>
      <div class="cal-canyon-selector">
        <button class="filter-btn" onclick="toggleCalCanyonDd()" style="width:100%">
          <span id="calCanyonLabel">Empress</span>
          <svg class="ch" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="filter-dd" id="calCanyonDd"></div>
      </div>
      <div class="cal-pad">
        <div class="cal-card">
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calPrev()">‹</button>
            <div class="cal-month" id="calMonth"></div>
            <button class="cal-nav-btn" onclick="calNext()">›</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>
      <div class="cal-info">
        <div class="cal-date-label" id="calDateLabel"></div>
        <div class="cal-count" id="calCount"></div>
      </div>
      <div class="cal-list" id="calList"></div>
    </div>

    <!-- MESSAGES TAB -->
    <div class="screen" id="msgTab">
      <div class="msg-topbar">
        <div class="topbar-title">Messages</div>
        <button class="icon-btn" onclick="showNewMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
        </button>
      </div>
      <div class="msg-search">
        <input id="msgSearchInput" class="msg-search-input" placeholder="Search" onkeyup="filterConversations()">
      </div>
      <div class="conversations-list" id="conversationsList"></div>

      <div class="chat-screen" id="chatScreen">
        <div class="chat-header">
          <div class="chat-back" onclick="closeChat()">←</div>
          <div class="chat-title" id="chatTitle">General</div>
        </div>
        <div class="msg-bubbles" id="msgBubbles"></div>
        <div class="msg-input-bar">
          <input id="chatInput" class="msg-input" placeholder="Message..." onkeydown="if(event.key==='Enter') sendChatMessage()">
          <button onclick="sendChatMessage()" style="background:var(--accent);color:white;border:none;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center">↑</button>
        </div>
      </div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="screen" id="settingsTab">
      <div class="topbar"><div class="topbar-title">Settings</div></div>
      <div class="settings-scroll">
        <div class="sec-label">Account</div>
        <div class="settings-card">
          <div class="prof-row" id="profRow">
            <div class="avatar-ph" id="profAvatar">?</div>
            <div class="set-info">
              <div class="set-label" id="profName">Loading...</div>
              <div class="set-desc" id="profEmail"></div>
            </div>
          </div>
        </div>
        <button class="signout-btn" onclick="signOut()">Sign Out</button>

        <div class="sec-label">Appearance</div>
        <div class="settings-card">
          <div class="sub-label">THEME</div>
          <div class="seg">
            <button class="seg-btn active" id="thL" onclick="setTheme('light',this)">Light</button>
            <button class="seg-btn" id="thD" onclick="setTheme('dark',this)">Dark</button>
            <button class="seg-btn" id="thS" onclick="setTheme('system',this)">System</button>
          </div>
          <div class="sub-label" style="border-top:1px solid var(--border)">TEXT SIZE</div>
          <div class="seg">
            <button class="seg-btn" onclick="setFs('13px',this)">Small</button>
            <button class="seg-btn active" onclick="setFs('15px',this)">Medium</button>
            <button class="seg-btn" onclick="setFs('17px',this)">Large</button>
          </div>
        </div>

        <div class="sec-label">Data</div>
        <div class="settings-card">
          <div class="set-row">
            <div class="set-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
            <div class="set-info">
              <div class="set-label">Last updated</div>
              <div class="set-desc" id="settingsUpdated">—</div>
            </div>
          </div>
          <div class="set-row">
            <div class="set-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
            <div class="set-info">
              <div class="set-label">Canyons tracked</div>
              <div class="set-desc" id="settingsCanyons">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <button class="nav-btn active" onclick="showTab('home',this)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Home
      </button>
      <button class="nav-btn" onclick="showTab('cal',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Calendar
      </button>
      <button class="nav-btn" onclick="showTab('msg',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Messages
      </button>
      <button class="nav-btn" onclick="showTab('settings',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </div>
</div>

<script>
const {createClient} = supabase;
const sb = createClient('https://akgftmrraboplxpeugvi.supabase.co', 'sb_publishable_aobHSo8qxS8sM85c5qO1Tw_R2-8NyO7');
const DATA_URL = 'https://mryike.github.io/canyon-tracker/data.json';
const CANYON_ORDER = ['Empress', 'Grand Canyon', 'Narrow Neck'];

let user = null;
let allData = {};
let canyon = 'Empress';
let conversations = [];
let currentChatId = null;

const GROUP_CHATS = [
  {id: "group:General", name: "General", type: "group", icon: "👥"},
  {id: "group:Empress", name: "Empress", type: "group", icon: "🏔️"},
  {id: "group:Grand", name: "Grand", type: "group", icon: "🏔️"},
  {id: "group:NarrowNeck", name: "Narrow Neck", type: "group", icon: "🏔️"}
];

// Text Size
function setFs(size, btn) {
  document.documentElement.style.setProperty('--fs', size);
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  localStorage.setItem('fs', size);
}

// Canyon helpers
function populateCanyons() {
  const dd = document.getElementById('canyonDd');
  const canyons = Object.keys(allData).sort((a, b) => {
    const ia = CANYON_ORDER.indexOf(a), ib = CANYON_ORDER.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    return ia - ib;
  });
  dd.innerHTML = canyons.map(c => `<div class="filter-opt${c === canyon ? ' sel' : ''}" onclick="selCanyon('${c}')">${c}</div>`).join('');
}

function populateCalCanyonDd() {
  const dd = document.getElementById('calCanyonDd');
  const canyons = Object.keys(allData).sort((a, b) => {
    const ia = CANYON_ORDER.indexOf(a), ib = CANYON_ORDER.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    return ia - ib;
  });
  dd.innerHTML = canyons.map(c => `<div class="filter-opt${c === canyon ? ' sel' : ''}" onclick="switchCalCanyon('${c}')">${c}</div>`).join('');
}

function toggleCalCanyonDd() {
  document.getElementById('calCanyonDd').classList.toggle('open');
}

function switchCalCanyon(name) {
  canyon = name;
  document.getElementById('calCanyonLabel').textContent = name;
  document.getElementById('calCanyonDd').classList.remove('open');
  renderCal();
}

function selCanyon(name) {
  canyon = name;
  document.getElementById('canyonLabel').textContent = name;
  document.getElementById('calCanyonLabel').textContent = name;
  document.getElementById('canyonDd').classList.remove('open');
  renderHome();
  renderCal();
}

// Messages
function renderConversations(filtered = null) {
  const container = document.getElementById('conversationsList');
  const list = filtered || conversations;
  container.innerHTML = list.map(conv => `
    <div class="conversation-item" onclick="openChat('${conv.id}')">
      <div class="conv-avatar">${conv.icon}</div>
      <div class="conv-info">
        <div class="conv-name">${conv.name}</div>
        <div class="conv-last">Tap to open chat</div>
      </div>
    </div>
  `).join('');
}

function filterConversations() {
  const term = document.getElementById('msgSearchInput').value.toLowerCase().trim();
  if (!term) return renderConversations();
  const filtered = conversations.filter(c => c.name.toLowerCase().includes(term));
  renderConversations(filtered);
}

function openChat(chatId) {
  currentChatId = chatId;
  const conv = conversations.find(c => c.id === chatId) || {name: "Chat"};
  document.getElementById('chatTitle').textContent = conv.name;
  document.getElementById('conversationsList').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('msgBubbles').innerHTML = `<div style="padding:60px 20px;text-align:center;color:var(--text3)">Conversation with ${conv.name} started.</div>`;
}

function closeChat() {
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('conversationsList').style.display = 'block';
}

function sendChatMessage() {
  const input = document.getElementById('chatInput');
  if (!input.value.trim()) return;
  const bubbles = document.getElementById('msgBubbles');
  bubbles.innerHTML += `<div class="msg-bubble mine">${input.value}</div>`;
  bubbles.scrollTop = bubbles.scrollHeight;
  input.value = '';
}

function showNewMessage() {
  const name = prompt("Search for a person to message:");
  if (name && name.trim()) {
    const newDM = {id: "dm:" + Date.now(), name: name.trim(), type: "dm", icon: "👤"};
    conversations.unshift(newDM);
    renderConversations();
    openChat(newDM.id);
  }
}

function showTab(name, btn) {
  document.querySelectorAll('#appScreen > .screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + 'Tab').classList.add('active');
  btn.classList.add('active');

  if (name === 'msg') {
    if (conversations.length === 0) conversations = [...GROUP_CHATS];
    document.getElementById('chatScreen').style.display = 'none';
    document.getElementById('conversationsList').style.display = 'block';
    renderConversations();
  }
  if (name === 'cal') {
    populateCalCanyonDd();
  }
}

// Data loading (simplified - add your full renderHome/renderCal if needed)
async function loadData(manual = false) {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    const json = await res.json();
    allData = json.data || {};
    populateCanyons();
    populateCalCanyonDd();
    document.getElementById('calCanyonLabel').textContent = canyon;
    // Add your renderHome() and renderCal() calls here
  } catch(e) {
    if (manual) alert('Failed to load data');
  }
}

async function signInGoogle() {
  await sb.auth.signInWithOAuth({provider: 'google', options: {redirectTo: window.location.origin}});
}

function signOut() {
  sb.auth.signOut();
  showScreen('loginScreen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function init() {
  // Restore text size
  const savedFs = localStorage.getItem('fs');
  if (savedFs) document.documentElement.style.setProperty('--fs', savedFs);

  const {data: {session}} = await sb.auth.getSession();
  if (session) {
    user = session.user;
    showScreen('appScreen');
    loadData();
  } else {
    showScreen('loginScreen');
  }
}

init();
</script>
