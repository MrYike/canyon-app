<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>Canyon Bookings</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c45e2a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Canyon"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f0ece6;--surface:#fff;--surface2:#e8e4de;--border:#ddd8d0;--text:#1a1208;--text2:#6b6050;--text3:#a89880;--accent:#c45e2a;--accent-bg:#fdf0e8;--accent-light:#f5e0cc;--nav:#fff;--radius:14px;--font:'Inter',sans-serif;--fs:15px}
.dark{--bg:#1a1510;--surface:#242018;--surface2:#2e2820;--border:#3a3228;--text:#f5f0e8;--text2:#a89070;--text3:#706050;--accent:#e07840;--accent-bg:#2a1e10;--accent-light:#3a2818;--nav:#1e1a14}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:var(--fs);background:var(--bg);color:var(--text);display:flex;justify-content:center}
.app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.screen.active{display:flex}
.loading-wrap{flex:1;display:flex;align-items:center;justify-content:center}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px;overflow-y:auto}
.login-icon{width:72px;height:72px;border-radius:18px;overflow:hidden;background:var(--accent-bg);display:flex;align-items:center;justify-content:center}
.login-icon img{width:100%;height:100%;object-fit:cover}
.login-title{font-size:24px;font-weight:700;color:var(--text);text-align:center}
.login-sub{font-size:14px;color:var(--text2);text-align:center;line-height:1.5;max-width:260px}
.google-btn{display:flex;align-items:center;gap:10px;padding:13px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;width:100%;max-width:280px;justify-content:center}
.google-btn:hover{background:var(--surface2)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.login-note{font-size:11px;color:var(--text3);text-align:center}
.onboard-wrap{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:20px}
.onboard-step{display:none;flex-direction:column;gap:16px}
.onboard-step.active{display:flex}
.onboard-title{font-size:22px;font-weight:700;color:var(--text)}
.onboard-sub{font-size:14px;color:var(--text2);line-height:1.5}
.role-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .15s}
.role-card:hover,.role-card.selected{border-color:var(--accent);background:var(--accent-bg)}
.role-card-title{font-size:16px;font-weight:600;color:var(--text)}
.role-card-sub{font-size:13px;color:var(--text2);margin-top:4px}
.onboard-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;font-family:var(--font);outline:none}
.onboard-input:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:14px;border-radius:12px;background:var(--accent);color:white;font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:var(--font)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:52px 16px 12px;background:var(--bg);flex-shrink:0}
.topbar-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.topbar-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.filters{display:flex;gap:8px;padding:0 16px 10px;flex-shrink:0}
.filter-wrap{position:relative;flex:1}
.filter-btn{display:flex;align-items:center;gap:6px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;width:100%}
.filter-btn svg{width:14px;height:14px;color:var(--accent);flex-shrink:0}
.filter-btn .ch{margin-left:auto;width:12px;height:12px;color:var(--text3);flex-shrink:0}
.filter-dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;overflow:hidden;display:none;max-height:240px;overflow-y:auto}
.filter-dd.open{display:block}
.filter-opt{padding:12px 14px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.filter-opt:last-child{border-bottom:none}
.filter-opt.sel{color:var(--accent)}
.filter-opt.sel::after{content:'✓';color:var(--accent);font-weight:700}
.hdiv{height:1px;background:var(--border);flex-shrink:0}
.summary-bar{padding:8px 16px;font-size:12px;color:var(--text3);flex-shrink:0}
.bookings-scroll{flex:1;overflow-y:auto;padding:8px 16px 16px;min-height:0}
.booking-card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.cal-pad{padding:10px 16px;flex-shrink:0}
.cal-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{width:30px;height:30px;border-radius:8px;background:none;border:none;cursor:pointer;color:var(--text);font-size:17px;display:flex;align-items:center;justify-content:center}
.cal-month{font-size:15px;font-weight:700;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-dow{text-align:center;font-size:10px;font-weight:500;color:var(--text3);padding:3px 0}
.cal-day{position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text)}
.cal-day.today{background:var(--accent);color:white}
.cal-day.selected:not(.today){background:var(--accent-bg);color:var(--accent)}
.cal-day .dot{width:4px;height:4px;border-radius:50%;background:var(--accent);position:absolute;bottom:2px}
.cal-info{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cal-date-label{font-size:15px;font-weight:700;color:var(--text)}
.cal-count{font-size:12px;color:var(--text3)}
.cal-list{flex:1;overflow-y:auto;padding:0 16px 16px;min-height:0}
.msg-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;min-height:0}
.conversation-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.conversation-item:hover{background:var(--surface2)}
.conversation-item .conv-name{font-size:16px;font-weight:600;color:var(--text)}
.conversation-item .conv-sub{font-size:13px;color:var(--text2)}
.msg-bubble{max-width:78%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.4}
.msg-bubble.mine{background:var(--accent);color:white;align-self:flex-end;border-bottom-right-radius:4px}
.msg-bubble.theirs{background:var(--surface);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.msg-name{font-size:10px;color:var(--text3);margin-bottom:2px}
.msg-time{font-size:9px;opacity:.7;margin-top:2px;text-align:right}
.msg-bar{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.msg-input{flex:1;padding:9px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.msg-send{width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg-send svg{width:15px;height:15px;color:white}
.bottom-nav{display:flex;background:var(--nav);border-top:1px solid var(--border);padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom));flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;border:none;background:none;cursor:pointer;font-size:10px;font-weight:500;color:var(--text3);font-family:var(--font)}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- all original screens (home, cal, settings, login, onboard) stay exactly the same -->
  <div class="screen active" id="loadingScreen"><div class="loading-wrap"><div class="spinner"></div></div></div>
  <!-- loginScreen, onboardScreen, homeTab, calTab, settingsTab are unchanged (omitted for brevity in this message but included in full file) -->

  <!-- MESSAGES TAB -->
  <div class="screen" id="msgTab">
    <div class="topbar">
      <div class="topbar-title">Messages</div>
      <button onclick="loadConversations()" class="icon-btn" style="margin-right:12px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
    </div>
    <div class="hdiv"></div>
    <div id="convListView" class="msg-list"></div>

    <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div style="padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0">
        <button onclick="backToConversations()" style="background:none;border:none;font-size:24px;color:var(--accent)">←</button>
        <div id="chatHeaderName" style="font-size:17px;font-weight:700;color:var(--text)"></div>
      </div>
      <div class="msg-list" id="chatMessageList"></div>
      <div class="msg-bar">
        <input class="msg-input" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button class="msg-send" onclick="sendMsg()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="bottom-nav" id="bottomNav">
    <button class="nav-btn active" onclick="showTab('home',this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</button>
    <button class="nav-btn" onclick="showTab('cal',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar</button>
    <button class="nav-btn" onclick="showTab('msg',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Messages</button>
    <button class="nav-btn" onclick="showTab('settings',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</button>
  </div>
</div>

<script>
const {createClient} = supabase;
const sb = createClient('https://akgftmrraboplxpeugvi.supabase.co', 'sb_publishable_aobHSo8qxS8sM85c5qO1Tw_R2-8NyO7');

const DATA_URL = 'https://mryike.github.io/canyon-tracker/data.json';
const CANYON_ORDER = ['Empress', 'Grand Canyon', 'Narrow Neck'];

let user = null;
let allData = {};
let canyon = 'Empress';
let dateStr = '';
let dateList = [];
let calY = new Date().getFullYear(), calM = new Date().getMonth(), calSel = '';

let currentConversation = null;
let messageSubscription = null;

const CANYON_CHATS = [
  { id: '620164c4-642b-4185-ae6c-b983900b275b', name: 'Empress Canyon' },
  { id: '5ee03e2c-9308-4e67-b64f-c98ca7b4559d', name: 'Grand Canyon' },
  { id: '542aebcf-e059-44b4-8c24-83e9ad5bac0e', name: 'Narrow Neck' }
];

const todayStr = () => new Date().toISOString().slice(0, 10);
function fmtFull(s) {
  const d = new Date(s + 'T12:00:00'), t = todayStr();
  const tom = new Date(); tom.setDate(tom.getDate() + 1);
  if (s === t) return 'Today';
  if (s === tom.toISOString().slice(0, 10)) return 'Tomorrow';
  return d.toLocaleDateString('en-AU', {weekday:'long', month:'long', day:'numeric'});
}
function getDateListForCanyon(c) { return Object.keys(allData[c] || {}).sort(); }

function populateCanyons() {
  const canyons = Object.keys(allData).sort((a, b) => {
    const ia = CANYON_ORDER.indexOf(a), ib = CANYON_ORDER.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
  document.getElementById('canyonDd').innerHTML = canyons.map(c => `<div class="filter-opt${c === canyon ? ' sel' : ''}" onclick="selCanyon('${c.replace(/'/g,"\\'")}',this)">${c}</div>`).join('');
  const calDd = document.getElementById('calCanyonDd');
  if (calDd) calDd.innerHTML = canyons.map(c => `<div class="filter-opt${c === canyon ? ' sel' : ''}" onclick="selCanyon('${c.replace(/'/g,"\\'")}',this)">${c}</div>`).join('');
  document.getElementById('settingsCanyons').textContent = canyons.join(', ');
}

function loadConversations() {
  const container = document.getElementById('convListView');
  document.getElementById('chatView').style.display = 'none';
  container.style.display = 'flex';

  container.innerHTML = CANYON_CHATS.map(c => `
    <div class="conversation-item" onclick="openConversation('${c.id}', '${c.name}')">
      <div class="conv-name">${c.name}</div>
      <div class="conv-sub">Group chat • Canyon team</div>
    </div>
  `).join('');
}

async function openConversation(id, name) {
  currentConversation = { id, name };
  document.getElementById('convListView').style.display = 'none';
  document.getElementById('chatView').style.display = 'flex';
  document.getElementById('chatHeaderName').textContent = name;
  await loadMessages();
  subscribeToMessages();
}

async function loadMessages() {
  const { data } = await sb.from('messages').select('*').eq('conversation_id', currentConversation.id).order('created_at', { ascending: true });
  renderMessages(data || []);
}

function renderMessages(msgs) {
  const list = document.getElementById('chatMessageList');
  list.innerHTML = msgs.map(m => {
    const isMine = m.sender_id === user.id;
    return `<div class="msg-bubble ${isMine ? 'mine' : 'theirs'}">
      ${!isMine ? `<div class="msg-name">Team</div>` : ''}
      <div>${m.content}</div>
      <div class="msg-time">${new Date(m.created_at).toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit',hour12:true})}</div>
    </div>`;
  }).join('');
  list.scrollTop = list.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !currentConversation || !user) return;

  await sb.from('messages').insert({ conversation_id: currentConversation.id, sender_id: user.id, content: content });
  input.value = '';
  loadMessages();
}

function subscribeToMessages() {
  if (messageSubscription) messageSubscription.unsubscribe();
  messageSubscription = sb.channel(`chat:${currentConversation.id}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `conversation_id=eq.${currentConversation.id}` }, loadMessages)
    .subscribe();
}

function backToConversations() {
  if (messageSubscription) messageSubscription.unsubscribe();
  currentConversation = null;
  document.getElementById('chatView').style.display = 'none';
  document.getElementById('convListView').style.display = 'flex';
  loadConversations();
}

// === ALL YOUR ORIGINAL FUNCTIONS (home, calendar, etc.) ===
function showTab(name, btn) {
  document.querySelectorAll('#appScreen>.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + 'Tab').classList.add('active');
  btn.classList.add('active');
  if (name === 'msg') loadConversations();
}
async function checkUser() { /* your original checkUser */ 
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    user = session.user;
    document.getElementById('profName').textContent = user.user_metadata?.full_name || 'Staff Member';
    document.getElementById('profEmail').textContent = user.email;
    document.getElementById('profAvatar').textContent = (user.user_metadata?.full_name || 'S')[0];
    showScreen('appScreen');
    loadData();
  } else showScreen('loginScreen');
}
async function loadData(force = false) { /* your original loadData */ 
  try {
    const res = await fetch(DATA_URL + (force ? `?t=${Date.now()}` : ''));
    const json = await res.json();
    allData = json.data || {};
    populateCanyons();
    dateList = getDateListForCanyon(canyon);
    dateStr = dateList.includes(todayStr()) ? todayStr() : (dateList[0] || todayStr());
    renderHome();
  } catch(e) { console.error(e); }
}
function renderHome() { /* your original renderHome */ 
  const list = document.getElementById('homeList');
  const day = (allData[canyon] || {})[dateStr];
  if (!day || !day.sold || day.sold.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg></div><div class="empty-title">No Bookings</div><div class="empty-sub">No one is booked for ${canyon} on this date.</div></div>`;
    document.getElementById('homeSummary').textContent = '0 bookings';
    return;
  }
  document.getElementById('homeSummary').textContent = `${day.sold.length} booking${day.sold.length === 1 ? '' : 's'}`;
  list.innerHTML = day.sold.map(b => `<div class="booking-card"><div class="booking-badges"><div class="badge badge-time"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${b.time || 'TBC'}</div></div><div class="booking-co">${b.company}</div><div style="font-size:13px;color:var(--text2);margin-top:4px">Pax: ${b.pax}</div></div>`).join('');
}
// ... (all other original functions like renderCal, selCanyon, etc. are in the full file you already have)

window.addEventListener('load', () => {
  checkUser();
});
</script>
</body>
</html>
