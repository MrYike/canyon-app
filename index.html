<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>Canyon Bookings</title>
<meta name="theme-color" content="#c45e2a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Canyon"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div class="app" id="app">

  <!-- Topbar injected by JS -->
  <div id="topbarEl"></div>

  <!-- Updated bar -->
  <div class="updated-bar" id="updatedBar" style="display:none">
    <div class="updated-dot" id="updatedDot"></div>
    <span id="updatedText"></span>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-wrap">
      <button class="filter-btn" onclick="toggleDd('canyonDd')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="canyonLabel" style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Empress</span>
        <svg class="ch" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="filter-dd" id="canyonDd"></div>
    </div>
    <div class="filter-wrap">
      <button class="filter-btn" onclick="toggleDd('dateDd')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="dateLabel" style="flex:1;text-align:left">Today</span>
        <svg class="ch" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="filter-dd" id="dateDd"></div>
    </div>
  </div>

  <div class="hdiv"></div>
  <div class="summary-bar" id="summaryBar">Loading...</div>
  <div class="hdiv"></div>
  <div class="page-scroll" id="bookingList"></div>

  <!-- Nav injected by JS -->
  <div id="navEl"></div>
</div>
<script src="shared.js"></script>
<script>
applyPreferences();

let dateStr = '';
let dateList = [];

async function init() {
  const user = await requireAuth();
  if (!user) return;

  document.getElementById('topbarEl').innerHTML = topbarHTML('Canyon Bookings', true, true);
  document.getElementById('navEl').innerHTML = NAV_HTML;
  highlightNav('home');
  closeDdsOnOutsideClick();

  // Load data (use cache first, then refresh)
  const data = await loadData();
  render(data);

  // Show updated bar
  const { label, stale } = fmtUpdated(State.updated);
  if (label) {
    document.getElementById('updatedText').textContent = label;
    document.getElementById('updatedDot').className = 'updated-dot' + (stale ? ' stale' : '');
    document.getElementById('updatedBar').style.display = 'flex';
  }
}

function render(data) {
  const canyons = sortedCanyons(data);
  const canyon = State.canyon;

  // Canyon dropdown
  document.getElementById('canyonLabel').textContent = canyon;
  document.getElementById('canyonDd').innerHTML = canyons.map(c =>
    `<div class="filter-opt${c === canyon ? ' sel' : ''}" onclick="pickCanyon('${c.replace(/'/g, "\\'")}')">${c}</div>`
  ).join('');

  // Date list
  dateList = Object.keys(data[canyon] || {}).sort();
  if (!dateStr || !dateList.includes(dateStr)) {
    dateStr = dateList.includes(todayStr()) ? todayStr() : (dateList[0] || todayStr());
  }

  // Date dropdown
  document.getElementById('dateLabel').textContent = fmtFull(dateStr);
  document.getElementById('dateDd').innerHTML = dateList.map(d =>
    `<div class="filter-opt${d === dateStr ? ' sel' : ''}" onclick="pickDate('${d}')">${fmtFull(d)}</div>`
  ).join('');

  renderBookings(data);
}

function renderBookings(data) {
  const list = document.getElementById('bookingList');
  const canyon = State.canyon;
  const day = (data[canyon] || {})[dateStr];

  if (!day || !day.sold || day.sold.length === 0) {
    document.getElementById('summaryBar').textContent = '0 bookings';
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
        </div>
        <div class="empty-title">No Bookings</div>
        <div class="empty-sub">No one is booked for ${canyon}<br>on ${fmtFull(dateStr).toLowerCase()}.</div>
      </div>`;
    return;
  }

  document.getElementById('summaryBar').textContent = `${day.sold.length} booking${day.sold.length === 1 ? '' : 's'}`;
  list.innerHTML = day.sold.map(b => `
    <div class="card">
      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        <div class="badge badge-time">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${b.time || 'TBC'}
        </div>
      </div>
      <div style="font-size:15px;font-weight:700">${b.company}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:4px">Pax: ${b.pax}</div>
    </div>
  `).join('');
}

function pickCanyon(c) {
  State.canyon = c;
  document.querySelectorAll('.filter-dd').forEach(d => d.classList.remove('open'));
  render(State.data);
}

function pickDate(d) {
  dateStr = d;
  document.getElementById('dateLabel').textContent = fmtFull(d);
  document.querySelectorAll('.filter-dd').forEach(el => el.classList.remove('open'));
  renderBookings(State.data);
}

async function refreshData() {
  document.getElementById('summaryBar').textContent = 'Refreshing...';
  const data = await loadData(true);
  render(data);
  const { label, stale } = fmtUpdated(State.updated);
  if (label) {
    document.getElementById('updatedText').textContent = label;
    document.getElementById('updatedDot').className = 'updated-dot' + (stale ? ' stale' : '');
    document.getElementById('updatedBar').style.display = 'flex';
  }
}

init();
</script>
</body>
</html>
