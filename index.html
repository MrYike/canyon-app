<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>Canyon Bookings</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c45e2a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0ece6;--surface:#fff;--surface2:#e8e4de;--border:#ddd8d0;
  --text:#1a1208;--text2:#6b6050;--text3:#a89880;
  --accent:#c45e2a;--accent-bg:#fdf0e8;
  --nav:#fff;--radius:14px;--font:'Inter',sans-serif;--fs:15px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:var(--fs);background:var(--bg);color:var(--text);display:flex;justify-content:center}
.app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:52px 16px 12px;background:var(--bg)}
.topbar-title{font-size:22px;font-weight:700;color:var(--text)}
.msg-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.conversation-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer}
.conversation-item .conv-name{font-size:17px;font-weight:600}
.msg-bubble{max-width:80%;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.4}
.msg-bubble.mine{background:var(--accent);color:white;align-self:flex-end;border-bottom-right-radius:4px}
.msg-bubble.theirs{background:var(--surface);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg-bar{display:flex;gap:8px;padding:12px 16px;background:var(--surface);border-top:1px solid var(--border)}
.msg-input{flex:1;padding:12px 16px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);outline:none;font-size:15px}
.msg-send{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;color:white;display:flex;align-items:center;justify-content:center}
.bottom-nav{display:flex;background:var(--nav);border-top:1px solid var(--border);padding:8px 0}
.nav-btn{flex:1;text-align:center;padding:6px 0;font-size:11px;color:var(--text2)}
.nav-btn.active{color:var(--accent)}
</style>
</head>
<body>
<div class="app">

  <!-- Messages Tab -->
  <div class="screen active" id="msgTab">
    <div class="topbar">
      <div class="topbar-title">Messages</div>
    </div>

    <!-- Conversation List -->
    <div id="convListView" class="msg-list"></div>

    <!-- Chat View -->
    <div id="chatView" style="display:none;flex:1;flex-direction:column">
      <div style="padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
        <button onclick="backToConversations()" style="font-size:28px;background:none;border:none;color:var(--accent)">←</button>
        <div id="chatHeaderName" style="font-size:18px;font-weight:700"></div>
      </div>
      <div id="chatMessageList" class="msg-list"></div>
      <div class="msg-bar">
        <input id="msgInput" class="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMsg()">
        <button class="msg-send" onclick="sendMsg()">↑</button>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showTab('msg')">Messages</button>
  </div>

</div>

<script>
const sb = supabase.createClient(
  'https://akgftmrraboplxpeugvi.supabase.co',
  'sb_publishable_aobHSo8qxS8sM85c5qO1Tw_R2-8NyO7'
);

const CANYON_CHATS = [
  { id: '620164c4-642b-4185-ae6c-b983900b275b', name: 'Empress Canyon' },
  { id: '5ee03e2c-9308-4e67-b64f-c98ca7b4559d', name: 'Grand Canyon' },
  { id: '542aebcf-e059-44b4-8c24-83e9ad5bac0e', name: 'Narrow Neck' }
];

let user = null;
let currentConversation = null;
let messageSubscription = null;

async function checkUser() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    user = session.user;
    loadConversations();
  } else {
    alert("Please sign in with Google first");
  }
}

function loadConversations() {
  const container = document.getElementById('convListView');
  container.innerHTML = CANYON_CHATS.map(chat => `
    <div class="conversation-item" onclick="openConversation('${chat.id}', '${chat.name}')">
      <div class="conv-name">${chat.name}</div>
      <div style="font-size:13px;color:#888">Tap to open group chat</div>
    </div>
  `).join('');
  console.log("✅ Conversation list rendered");
}

async function openConversation(id, name) {
  currentConversation = { id, name };
  document.getElementById('convListView').style.display = 'none';
  document.getElementById('chatView').style.display = 'flex';
  document.getElementById('chatHeaderName').textContent = name;

  console.log("Opening chat:", name);
  await loadMessages();
  subscribeToMessages();
}

async function loadMessages() {
  if (!currentConversation) return;
  const { data, error } = await sb
    .from('messages')
    .select('*')
    .eq('conversation_id', currentConversation.id)
    .order('created_at', { ascending: true });

  if (error) console.error("Load error:", error);
  renderMessages(data || []);
}

function renderMessages(msgs) {
  const list = document.getElementById('chatMessageList');
  list.innerHTML = msgs.map(m => {
    const isMine = m.sender_id === user.id;
    return `<div class="msg-bubble ${isMine ? 'mine' : 'theirs'}">
      <div>${m.content}</div>
      <div style="font-size:10px;opacity:0.7;margin-top:4px">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
    </div>`;
  }).join('');
  list.scrollTop = list.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !currentConversation || !user) {
    alert("Cannot send - missing data");
    return;
  }

  const { error } = await sb.from('messages').insert({
    conversation_id: currentConversation.id,
    sender_id: user.id,
    content: content
  });

  if (error) {
    console.error("Send failed:", error);
    alert("Send failed: " + error.message);
    return;
  }

  input.value = '';
  loadMessages();
}

function subscribeToMessages() {
  if (messageSubscription) messageSubscription.unsubscribe();
  messageSubscription = sb.channel(`chat:${currentConversation.id}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: `conversation_id=eq.${currentConversation.id}`
    }, () => loadMessages())
    .subscribe();
}

function backToConversations() {
  if (messageSubscription) messageSubscription.unsubscribe();
  document.getElementById('chatView').style.display = 'none';
  document.getElementById('convListView').style.display = 'flex';
  currentConversation = null;
}

function showTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(tab + 'Tab').classList.add('active');
}

window.addEventListener('load', checkUser);
</script>
</body>
</html>
