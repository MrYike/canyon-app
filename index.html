<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>Canyon Bookings</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c45e2a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Canyon"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* (same style as before - unchanged) */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f0ece6;--surface:#fff;--surface2:#e8e4de;--border:#ddd8d0;--text:#1a1208;--text2:#6b6050;--text3:#a89880;--accent:#c45e2a;--accent-bg:#fdf0e8;--accent-light:#f5e0cc;--nav:#fff;--radius:14px;--font:'Inter',sans-serif;--fs:15px;}
.dark{--bg:#1a1510;--surface:#242018;--surface2:#2e2820;--border:#3a3228;--text:#f5f0e8;--text2:#a89070;--text3:#706050;--accent:#e07840;--accent-bg:#2a1e10;--accent-light:#3a2818;--nav:#1e1a14;}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:var(--fs);background:var(--bg);color:var(--text);display:flex;justify-content:center}
.app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.screen.active{display:flex}
/* ... (all the same CSS you had before - I kept it identical) ... */
.msg-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;min-height:0}
.conversation-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.conversation-item:hover{background:var(--surface2)}
.conversation-item .conv-name{font-size:16px;font-weight:600;color:var(--text)}
.conversation-item .conv-sub{font-size:13px;color:var(--text2)}
.msg-bubble{max-width:78%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.4}
.msg-bubble.mine{background:var(--accent);color:white;align-self:flex-end;border-bottom-right-radius:4px}
.msg-bubble.theirs{background:var(--surface);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.msg-name{font-size:10px;color:var(--text3);margin-bottom:2px}
.msg-time{font-size:9px;opacity:.7;margin-top:2px;text-align:right}
.msg-bar{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.msg-input{flex:1;padding:9px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.msg-send{width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg-send svg{width:15px;height:15px;color:white}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- (all the same HTML as your last version - login, home, cal, msgTab, settings, bottom nav) -->
  <!-- ... skipping the long HTML for brevity - it's identical to the last full file I gave you ... -->
  <!-- MESSAGES TAB -->
  <div class="screen" id="msgTab">
    <div class="topbar"><div class="topbar-title">Messages</div></div>
    <div class="hdiv"></div>
    <div id="convListView" class="msg-list"></div>
    <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div style="padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0">
        <button onclick="backToConversations()" style="background:none;border:none;font-size:24px;color:var(--accent)">←</button>
        <div id="chatHeaderName" style="font-size:17px;font-weight:700;color:var(--text)"></div>
      </div>
      <div class="msg-list" id="chatMessageList"></div>
      <div class="msg-bar">
        <input class="msg-input" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button class="msg-send" onclick="sendMsg()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
  <!-- rest of your screens unchanged -->
</div>

<script>
const sb = supabase.createClient(
  'https://akgftmrraboplxpeugvi.supabase.co',
  'sb_publishable_aobHSo8qxS8sM85c5qO1Tw_R2-8NyO7'
);

const CANYON_CHATS = [
  { id: '620164c4-642b-4185-ae6c-b983900b275b', name: 'Empress Canyon' },
  { id: '5ee03e2c-9308-4e67-b64f-c98ca7b4559d', name: 'Grand Canyon' },
  { id: '542aebcf-e059-44b4-8c24-83e9ad5bac0e', name: 'Narrow Neck' }
];

let user = null;
let currentConversation = null;
let messageSubscription = null;

// ... (all your other functions are the same) ...

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !currentConversation || !user) return;

  const { error } = await sb
    .from('messages')
    .insert({ 
      conversation_id: currentConversation.id, 
      sender_id: user.id, 
      content 
    });

  if (error) {
    console.error("Send error:", error);
    alert("❌ Send failed: " + error.message + "\n\nCheck console for details");
    return;
  }

  input.value = '';
  loadMessages();
}

// rest of your code (loadConversations, openConversation, loadMessages, etc.) is unchanged

window.addEventListener('load', () => {
  checkUser();
});
</script>
</body>
</html>
