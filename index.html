<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>Canyon Bookings</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c45e2a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Canyon"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0ece6;--surface:#fff;--surface2:#e8e4de;--border:#ddd8d0;
  --text:#1a1208;--text2:#6b6050;--text3:#a89880;
  --accent:#c45e2a;--accent-bg:#fdf0e8;--accent-light:#f5e0cc;
  --nav:#fff;--radius:14px;--font:'Inter',sans-serif;--fs:15px;
}
.dark{
  --bg:#1a1510;--surface:#242018;--surface2:#2e2820;--border:#3a3228;
  --text:#f5f0e8;--text2:#a89070;--text3:#706050;
  --accent:#e07840;--accent-bg:#2a1e10;--accent-light:#3a2818;--nav:#1e1a14;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:var(--fs);background:var(--bg);color:var(--text);display:flex;justify-content:center}
.app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.screen.active{display:flex}
/* Loading */
.loading-wrap{flex:1;display:flex;align-items:center;justify-content:center}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Login */
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px;overflow-y:auto}
.login-icon{width:72px;height:72px;border-radius:18px;overflow:hidden;background:var(--accent-bg);display:flex;align-items:center;justify-content:center}
.login-icon img{width:100%;height:100%;object-fit:cover}
.login-title{font-size:24px;font-weight:700;color:var(--text);text-align:center}
.login-sub{font-size:14px;color:var(--text2);text-align:center;line-height:1.5;max-width:260px}
.google-btn{display:flex;align-items:center;gap:10px;padding:13px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;width:100%;max-width:280px;justify-content:center}
.google-btn:hover{background:var(--surface2)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:52px 16px 12px;background:var(--bg);flex-shrink:0}
.topbar-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.topbar-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.icon-btn svg{width:17px;height:17px;color:var(--text2)}
.avatar-ph{width:32px;height:32px;border-radius:50%;background:var(--accent-bg);border:2px solid var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent)}
/* Updated banner */
.updated-bar{padding:6px 16px;font-size:11px;color:var(--text3);flex-shrink:0;display:flex;align-items:center;gap:6px}
.updated-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;flex-shrink:0}
.updated-dot.stale{background:#ff9800}
/* Filters */
.filters{display:flex;gap:8px;padding:0 16px 10px;flex-shrink:0}
.filter-wrap{position:relative;flex:1}
.filter-btn{display:flex;align-items:center;gap:6px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;width:100%}
.filter-btn svg{width:14px;height:14px;color:var(--accent);flex-shrink:0}
.filter-btn .ch{margin-left:auto;width:12px;height:12px;color:var(--text3);flex-shrink:0}
.filter-dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;overflow:hidden;display:none;max-height:240px;overflow-y:auto}
.filter-dd.open{display:block}
.filter-opt{padding:12px 14px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.filter-opt:last-child{border-bottom:none}
.filter-opt.sel{color:var(--accent)}
.filter-opt.sel::after{content:'✓';color:var(--accent);font-weight:700}
.filter-opt:hover{background:var(--surface2)}
.hdiv{height:1px;background:var(--border);flex-shrink:0}
.summary-bar{padding:8px 16px;font-size:12px;color:var(--text3);flex-shrink:0}
/* Booking list */
.bookings-scroll{flex:1;overflow-y:auto;padding:8px 16px 16px;min-height:0}
.booking-card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-light)}
.booking-co{font-size:15px;font-weight:700;color:var(--text)}
/* Calendar */
.cal-pad{padding:10px 16px;flex-shrink:0}
.cal-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{width:30px;height:30px;border-radius:8px;background:none;border:none;cursor:pointer;color:var(--text);font-size:17px;display:flex;align-items:center;justify-content:center}
.cal-nav-btn:hover{background:var(--surface2)}
.cal-month{font-size:15px;font-weight:700;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-day{position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text)}
.cal-day.today{background:var(--accent);color:white}
.cal-day.selected:not(.today){background:var(--accent-bg);color:var(--accent)}
.cal-info{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cal-date-label{font-size:15px;font-weight:700;color:var(--text)}
.cal-count{font-size:12px;color:var(--text3)}
.cal-list{flex:1;overflow-y:auto;padding:0 16px 16px;min-height:0}
/* Settings */
.settings-scroll{flex:1;overflow-y:auto;padding:0 16px 24px;min-height:0}
.sec-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 6px}
.settings-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:8px}
.sub-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:12px 14px 6px}
.seg{display:flex;gap:3px;padding:0 8px 10px}
.seg-btn{flex:1;padding:7px;border-radius:7px;border:none;background:none;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s}
.seg-btn.active{background:var(--surface);color:var(--accent);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.set-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-top:1px solid var(--border)}
.set-icon{width:32px;height:32px;border-radius:9px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-icon svg{width:16px;height:16px;color:var(--accent)}
.set-info{flex:1}
.set-label{font-size:14px;font-weight:600;color:var(--text)}
.set-desc{font-size:11px;color:var(--text3);margin-top:1px}
.prof-row{display:flex;align-items:center;gap:12px;padding:14px}
.prof-name{font-size:14px;font-weight:600;color:var(--text)}
.signout-btn{width:100%;padding:13px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:4px}
/* Bottom nav */
.bottom-nav{display:flex;background:var(--nav);border-top:1px solid var(--border);padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom));flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;border:none;background:none;cursor:pointer;font-size:10px;font-weight:500;color:var(--text3);font-family:var(--font)}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px}

/* New Dropdown Style for Calendar Tab */
.cal-select {
  background: none;
  border: none;
  color: var(--text2);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  outline: none;
  cursor: pointer;
  padding: 0;
  appearance: none;
  -webkit-appearance: none;
}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="screen active" id="loadingScreen">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>

  <div class="screen" id="appScreen">

    <div class="screen active" id="homeTab">
      <div class="topbar">
        <div class="topbar-title">Canyon Bookings</div>
        <div class="topbar-actions">
          <button class="icon-btn" onclick="loadData(true)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          </button>
          <div class="avatar-ph">JD</div>
        </div>
      </div>
      <div class="updated-bar" id="updatedBar">
        <div class="updated-dot"></div>
        <span id="updatedText">Updated 5m ago</span>
      </div>
      <div class="filters">
        <div class="filter-wrap">
          <button class="filter-btn" onclick="toggleDd('canyonDd')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span id="canyonLabel" style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Empress</span>
            <svg class="ch" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="filter-dd" id="canyonDd"></div>
        </div>
        <div class="filter-wrap">
          <button class="filter-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span style="flex:1;text-align:left">Today</span>
          </button>
        </div>
      </div>
      <div class="hdiv"></div>
      <div class="summary-bar" id="homeSummary">Loading...</div>
      <div class="bookings-scroll" id="homeList"></div>
    </div>

    <div class="screen" id="calTab">
      <div class="topbar">
        <div>
          <div class="topbar-title">Calendar</div>
          <select id="calCanyonSelect" class="cal-select" onchange="selCanyon(this.value)">
            </select>
        </div>
      </div>
      <div class="hdiv"></div>
      <div class="cal-pad">
        <div class="cal-card">
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calPrev()">‹</button>
            <div class="cal-month" id="calMonth">April 2026</div>
            <button class="cal-nav-btn" onclick="calNext()">›</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>
      <div class="cal-info">
        <div class="cal-date-label" id="calDateLabel">Friday 17 April</div>
        <div class="cal-count" id="calCount"></div>
      </div>
      <div class="hdiv"></div>
      <div class="cal-list" id="calList"></div>
    </div>

    <div class="screen" id="settingsTab">
      <div class="topbar"><div class="topbar-title">Settings</div></div>
      <div class="hdiv"></div>
      <div class="settings-scroll">
        <div class="sec-label">Appearance</div>
        <div class="settings-card">
          <div class="sub-label">THEME</div>
          <div class="seg" style="background:var(--surface2);margin:0 8px 10px;border-radius:9px;padding:3px">
            <button class="seg-btn active" onclick="setTheme('light',this)">Light</button>
            <button class="seg-btn" onclick="setTheme('dark',this)">Dark</button>
          </div>
          <div class="sub-label" style="border-top:1px solid var(--border)">TEXT SIZE</div>
          <div class="seg" style="background:var(--surface2);margin:0 8px 10px;border-radius:9px;padding:3px">
            <button class="seg-btn" onclick="setFs('13px',this)">Small</button>
            <button class="seg-btn active" onclick="setFs('15px',this)">Medium</button>
            <button class="seg-btn" onclick="setFs('17px',this)">Large</button>
          </div>
        </div>
        <div class="sec-label">Data</div>
        <div class="settings-card">
          <div class="set-row" style="border-top:none">
            <div class="set-icon">🕒</div>
            <div class="set-info">
              <div class="set-label">Last updated</div>
              <div class="set-desc" id="settingsUpdated">2026-04-17 09:30</div>
            </div>
          </div>
          <div class="set-row">
            <div class="set-icon">📍</div>
            <div class="set-info">
              <div class="set-label">Canyons tracked</div>
              <div class="set-desc" id="settingsCanyons">Empress, Grand Canyon, Narrow Neck</div>
            </div>
          </div>
        </div>
        <button class="signout-btn">Sign Out</button>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn active" onclick="showTab('home',this)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
      </button>
      <button class="nav-btn" onclick="showTab('cal',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar
      </button>
      <button class="nav-btn" onclick="showTab('settings',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings
      </button>
    </div>
  </div>
</div>

<script>
const CANYON_ORDER = ['Empress', 'Grand Canyon', 'Narrow Neck'];
let allData = {
  "Empress": { "2026-04-17": { sold: ["09:30:00", "11:00:00"] } },
  "Grand Canyon": { "2026-04-17": { sold: ["10:30:00"] } },
  "Narrow Neck": { "2026-04-17": { sold: [] } }
};
let canyon = 'Empress';

// 1. UPDATED TIME FORMATTER (Exactly 9:30am)
const parseTime = iso => {
  try {
    const d = new Date(iso.includes('T') ? iso : `2026-04-17T${iso}`);
    let h = d.getHours();
    const m = d.getMinutes().toString().padStart(2, '0');
    const ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    return `${h}:${m}${ampm}`;
  } catch { return iso; }
};

// 2. UPDATED TEXT SIZE (Global Update)
function setFs(size, btn) {
  document.documentElement.style.setProperty('--fs', size);
  const parent = btn.parentElement;
  parent.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// 3. UPDATED CANYON SYNCING
function populateCanyons() {
  const dd = document.getElementById('canyonDd');
  const calSelect = document.getElementById('calCanyonSelect');
  
  // Home dropdown items
  dd.innerHTML = CANYON_ORDER.map(c =>
    `<div class="filter-opt${c === canyon ? ' sel' : ''}" onclick="selCanyon('${c}')">${c}</div>`
  ).join('');

  // Calendar select items
  calSelect.innerHTML = CANYON_ORDER.map(c => 
    `<option value="${c}" ${c === canyon ? 'selected' : ''}>${c}</option>`
  ).join('');
}

function selCanyon(c) {
  canyon = c;
  document.getElementById('canyonLabel').textContent = c;
  document.getElementById('calCanyonSelect').value = c;
  document.getElementById('canyonDd').classList.remove('open');
  renderHome();
  renderCal();
}

// Navigation & Theme
function showTab(name, btn) {
  document.querySelectorAll('#appScreen>.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + 'Tab').classList.add('active');
  btn.classList.add('active');
}

function setTheme(theme, btn) {
  document.body.classList.toggle('dark', theme === 'dark');
  btn.parentElement.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleDd(id) {
  document.getElementById(id).classList.toggle('open');
}

// Logic to render lists
function renderHome() {
  const list = document.getElementById('homeList');
  const dayData = allData[canyon]["2026-04-17"] || { sold: [] };
  list.innerHTML = dayData.sold.map(t => `
    <div class="booking-card">
      <div class="badge">🕒 ${parseTime(t)}</div>
      <div class="booking-co" style="margin-top:8px">${canyon}</div>
    </div>
  `).join('') || '<div style="text-align:center;padding:40px;color:var(--text3)">No bookings found</div>';
  document.getElementById('homeSummary').textContent = `${dayData.sold.length} Bookings found`;
}

function renderCal() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = Array.from({length:30}, (_,i)=>`<div class="cal-day ${i+1===17?'today':''}">${i+1}</div>`).join('');
}

// Init
window.onload = () => {
  populateCanyons();
  renderHome();
  renderCal();
  setTimeout(()=>document.getElementById('loadingScreen').classList.remove('active'), 800);
};
</script>
</body>
</html>
